<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>治験届管理 - UXモック</title>
    <style>
:root {
  color-scheme: light;
  font-family: Segoe UI, Yu Gothic UI, Meiryo, sans-serif;
  background: var(--app-bg);
  color: #242424;
  /* デザイントークン: モデル駆動型の New Look (Fluent 2, 2026 Wave 1 で必須化) +
     モダンテーマ override (modern-theme-overrides) で実現可能な範囲に準拠。
     ブランド色は Fluent 2 既定 brand ramp (#0f6cbd 系)。旧 classic テーマ (#002050) は廃止済み */
  --accent: #0f6cbd;
  --accent-strong: #115ea3;
  --accent-soft: #ebf3fc;
  --accent-border: #b4d6fa;
  --link: #115ea3;
  --header-bg: #ffffff;
  --app-bg: #fafafa;
  --sidebar-bg: #f7f7f7;
  --selected: #ebf3fc;
  --hover: #f0f0f0;
  --line: #e4e4e4;
  --control-border: #d1d1d1;
  --text-muted: #616161;
  --radius-card: 8px;
  --radius-control: 4px;
  --shadow-card: 0 1px 3px rgba(0, 0, 0, .06), 0 1px 2px rgba(0, 0, 0, .04);
}

body {
  font-size: 14px
}

.app-frame {
  display: flex;
  flex-direction: column;
  min-height: 100vh
}

.app-topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  gap: 16px;
  height: 48px;
  flex: 0 0 48px;
  padding: 0 12px;
  background: var(--header-bg);
  color: #242424;
  border-bottom: 1px solid var(--line)
}

.app-tile {
  display: grid;
  place-items: center;
  width: 28px;
  height: 28px;
  border-radius: 6px;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700
}

.app-topbar-left {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 236px
}

.app-topbar-left strong {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap
}

.topbar-icon {
  display: grid;
  place-items: center;
  width: 32px;
  height: 32px;
  border: 0;
  border-radius: var(--radius-control);
  background: transparent;
  color: #424242
}

.topbar-icon:hover {
  background: var(--hover)
}

.app-topbar-search {
  flex: 1;
  max-width: 470px;
  display: flex;
  align-items: center;
  gap: 8px;
  height: 32px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius-control);
  background: #f5f5f5;
  color: var(--text-muted)
}

.app-topbar-search input {
  flex: 1;
  min-width: 0;
  border: 0;
  outline: none;
  background: transparent;
  font-size: 13px;
  color: #242424
}

.app-topbar-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 2px
}

.topbar-avatar {
  display: grid;
  place-items: center;
  width: 30px;
  height: 30px;
  margin-left: 8px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 12px;
  font-weight: 700
}

* {
  box-sizing: border-box
}

body {
  margin: 0
}

button,
input,
textarea,
select {
  font: inherit
}

button {
  cursor: pointer
}

h1,
h2,
h3,
p {
  margin: 0
}

.ctn-shell {
  display: grid;
  grid-template-columns: 236px minmax(820px, 1fr);
  flex: 1;
  background: var(--app-bg)
}

.side-nav {
  position: sticky;
  top: 48px;
  height: calc(100vh - 48px);
  overflow: auto;
  padding: 14px 8px;
  background: var(--sidebar-bg);
  color: #242424;
  border-right: 1px solid var(--line)
}

nav {
  display: grid;
  gap: 16px
}

.nav-group p {
  margin: 0 10px 4px;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 600
}

.nav-group {
  display: grid;
  gap: 1px
}

.nav-group button {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  min-height: 36px;
  padding: 7px 10px;
  border: 0;
  border-radius: var(--radius-control);
  background: transparent;
  color: #242424;
  font-size: 13px;
  font-weight: 400;
  text-align: left
}

.nav-group button svg {
  color: var(--text-muted)
}

.nav-group button:hover {
  background: var(--hover)
}

.nav-group button.active {
  background: var(--selected);
  box-shadow: inset 3px 0 var(--accent);
  font-weight: 600
}

.nav-group button.active svg {
  color: var(--accent)
}

.workspace {
  min-width: 0;
  padding: 24px
}

.topbar {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  align-items: center;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--line)
}

.topbar small,
.section-title p,
.metric small,
.rule-list span,
.field small,
.check-card p {
  color: var(--text-muted)
}

.topbar small {
  font-weight: 800
}

h1 {
  margin-top: 2px;
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 0
}

h2 {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0
}

h3 {
  font-size: 14px
}

.toolbar,
.metric-strip,
.section-title,
.flow,
.workflow-bar,
.tabs,
.pdf-head {
  display: flex
}

.toolbar {
  gap: 8px;
  flex-wrap: wrap
}

.primary-button,
.ghost-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 32px;
  padding: 0 12px;
  border-radius: var(--radius-control);
  border: 0;
  background: transparent;
  color: #242424;
  font-size: 13px;
  font-weight: 400
}

.ghost-button svg {
  color: var(--accent)
}

.ghost-button:hover {
  background: var(--hover)
}

.primary-button {
  background: var(--accent);
  color: #fff;
  font-weight: 600
}

.primary-button:hover {
  background: var(--accent-strong)
}

.wide-button {
  width: 100%;
  margin-top: 14px
}

.page-grid {
  display: grid;
  gap: 18px;
  margin-top: 20px
}

.two-col {
  display: grid;
  grid-template-columns: minmax(0, 1.35fr) minmax(320px, .65fr);
  gap: 18px
}

.panel {
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: var(--radius-card);
  background: #fff;
  box-shadow: var(--shadow-card)
}

.section-title {
  justify-content: space-between;
  gap: 18px;
  align-items: flex-start;
  margin-bottom: 16px
}

.section-title>div {
  display: grid;
  gap: 6px
}

.tag {
  width: fit-content;
  padding: 2px 8px;
  border-radius: 2px;
  background: #f3f3f3;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 600
}

.metric-strip {
  gap: 12px;
  flex-wrap: wrap
}

.metric {
  flex: 1;
  min-width: 160px;
  display: grid;
  gap: 6px;
  padding: 15px;
  border: 1px solid var(--line);
  border-radius: var(--radius-card);
  background: #fff;
  box-shadow: var(--shadow-card)
}

.metric span {
  font-weight: 700
}

.metric strong {
  font-size: 24px
}

.metric.danger,
.pill.danger,
.check-card.danger {
  border-color: #efb8ad;
  background: #fff3ef;
  color: #9d351c
}

.metric.watch,
.pill.watch,
.check-card.watch {
  border-color: #e5cf83;
  background: #fff9e6;
  color: #7b5b00
}

.pill {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 0 8px;
  border: 1px solid #cfe5df;
  border-radius: 999px;
  background: #eef8f5;
  color: #146454;
  font-size: 12px;
  font-weight: 800
}

.table-wrap {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: var(--radius-control)
}

.matrix-foot {
  margin-top: 10px;
  color: var(--text-muted);
  font-size: 12px
}

table {
  width: 100%;
  min-width: 780px;
  border-collapse: collapse
}

th,
td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: middle;
  white-space: nowrap
}

th {
  background: #fff;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 600
}

tbody tr:hover td {
  background: var(--hover)
}

tr:last-child td {
  border-bottom: 0
}

.flow {
  gap: 9px;
  flex-wrap: wrap
}

.flow article {
  flex: 1;
  min-width: 132px;
  display: grid;
  gap: 7px;
  padding: 13px;
  border: 1px solid var(--line);
  border-radius: var(--radius-card);
  background: #fbfcfc
}

.flow span,
.workflow-bar span {
  display: grid;
  place-items: center;
  width: 25px;
  height: 25px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 12px;
  font-weight: 800
}

.rule-list {
  display: grid;
  gap: 10px
}

.rule-list article {
  display: grid;
  gap: 3px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius-card);
  background: #fbfcfc
}

.import-layout,
.output-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 320px;
  gap: 18px;
  align-items: start
}

.upload-box {
  display: grid;
  grid-template-columns: 32px 1fr;
  gap: 4px 10px;
  margin-bottom: 14px;
  padding: 14px;
  border: 1px dashed var(--control-border);
  border-radius: var(--radius-card);
  background: var(--selected)
}

.upload-box span {
  grid-column: 2;
  color: var(--text-muted);
  font-size: 13px
}

.authoring-page {
  margin-top: 20px
}

.authoring {
  display: grid;
  grid-template-columns: minmax(420px, 1fr) 330px;
  gap: 16px;
  margin-top: 14px;
  align-items: start
}

.editor-panel,
.inspector {
  padding: 16px;
  border: 1px solid #dce6e9;
  border-radius: var(--radius-card);
  background: #fff
}

/* 章メニュー: 上部横並びのセグメント型タブ */
.chapter-tabs {
  display: flex;
  gap: 4px;
  padding: 4px;
  border-radius: var(--radius-card);
  background: #f0f0f0;
  overflow-x: auto
}

.chapter-tabs button {
  display: grid;
  gap: 2px;
  padding: 7px 14px;
  border: 1px solid transparent;
  border-radius: 6px;
  background: transparent;
  color: #242424;
  text-align: left;
  white-space: nowrap
}

.chapter-tabs button span {
  font-size: 13px;
  font-weight: 600
}

.chapter-tabs button small {
  color: var(--text-muted);
  font-size: 11px
}

.chapter-tabs button:hover {
  background: #e6e6e6
}

.chapter-tabs button.has-issue small {
  color: #8a6a00
}

.chapter-tabs button.selected {
  border-color: var(--line);
  background: #fff;
  box-shadow: var(--shadow-card)
}

.chapter-tabs button.selected span {
  color: var(--accent-strong)
}

.master-menu button.selected {
  border-color: var(--accent-border);
  background: var(--accent-soft);
  box-shadow: inset 3px 0 var(--accent)
}

.field-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(240px, 1fr));
  gap: 12px
}

.field {
  display: grid;
  gap: 7px
}

.field.wide {
  grid-column: 1 / -1
}

.field span {
  font-weight: 800
}

.field input,
.field select,
.field textarea {
  width: 100%;
  min-height: 32px;
  padding: 6px 8px;
  border: 1px solid var(--control-border);
  border-radius: var(--radius-control);
  background: #fff
}

.field input:focus,
.field select:focus,
.field textarea:focus {
  outline: 1px solid var(--accent);
  border-color: var(--accent)
}

.field textarea {
  min-height: 78px;
  resize: vertical
}

.master-layout {
  display: grid;
  grid-template-columns: 280px minmax(0, 1fr);
  gap: 16px;
  margin-top: 20px;
  align-items: start
}

.master-workspace {
  display: grid;
  gap: 16px
}

.master-menu {
  position: sticky;
  top: 20px;
  display: grid;
  gap: 8px;
  padding: 16px;
  border: 1px solid #dce6e9;
  border-radius: var(--radius-card);
  background: #fff
}

.master-menu h2 {
  margin-bottom: 6px
}

.master-menu button {
  display: grid;
  gap: 4px;
  width: 100%;
  padding: 11px;
  border: 1px solid var(--line);
  border-radius: var(--radius-control);
  background: #fff;
  color: #242424;
  text-align: left
}

.master-menu button span {
  font-weight: 800
}

.master-menu button small {
  color: var(--text-muted);
  line-height: 1.5
}

.sub-panel {
  margin-top: 18px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: var(--radius-card);
  background: #fbfcfc
}

.sub-panel h3 {
  margin-bottom: 10px
}

.link-button {
  border: 0;
  padding: 0;
  background: transparent;
  color: var(--link);
  font-weight: 600;
  text-decoration: underline;
  text-underline-offset: 3px
}

.form-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 16px
}

.form-actions button:disabled {
  cursor: not-allowed;
  opacity: .45
}

.tabs {
  gap: 4px;
  margin-bottom: 12px
}

.tabs {
  border-bottom: 1px solid var(--line)
}

.tabs button {
  flex: 1;
  min-height: 32px;
  border: 0;
  border-bottom: 3px solid transparent;
  border-radius: 0;
  background: transparent;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 600
}

.tabs button:hover {
  background: var(--hover)
}

.tabs button.active {
  border-bottom-color: var(--accent);
  color: #242424
}

.mini-panel {
  display: grid;
  gap: 10px;
  margin-bottom: 14px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius-card);
  background: #fbfcfc
}

.mini-panel ul {
  display: grid;
  gap: 8px;
  margin: 0;
  padding: 0;
  list-style: none
}

.mini-panel li {
  display: flex;
  gap: 7px;
  align-items: center;
  color: var(--text-muted);
  font-size: 13px
}

.mini-panel .table-wrap {
  border: 0
}

.mini-panel table {
  min-width: 300px
}

.mini-panel th,
.mini-panel td {
  padding: 8px;
  font-size: 12px
}

.pdf-preview {
  display: grid;
  gap: 10px;
  padding: 13px;
  border: 1px solid var(--line);
  border-radius: var(--radius-card);
  background: #fbfcfc
}

.source-viewer {
  display: grid;
  gap: 10px;
  padding: 13px;
  border: 1px solid var(--line);
  border-radius: var(--radius-card);
  background: #f8fbfc
}

.pdf-preview.compact {
  margin-top: 14px
}

.pdf-head {
  align-items: center;
  gap: 8px
}

.pdf-page {
  min-height: 360px;
  padding: 22px 18px;
  border: 1px solid #d8e1e4;
  border-radius: 4px;
  background: #fff;
  box-shadow: 0 12px 24px #142d3714;
  font-family: Yu Gothic, Meiryo, sans-serif;
  font-size: 12px;
  line-height: 2
}

.source-page {
  min-height: 320px;
  padding: 18px;
  border: 1px solid #d8e1e4;
  border-radius: 6px;
  background: #fff;
  color: #273b43;
  font-size: 13px;
  line-height: 2
}

.source-title {
  margin-bottom: 12px;
  color: var(--text-muted);
  font-weight: 800
}

.source-mark {
  margin: 6px -4px;
  padding: 2px 4px;
  border-left: 3px solid #176154;
  background: #eef8f5
}

.source-note {
  margin-top: 18px;
  padding: 10px;
  border-radius: 6px;
  background: #fff9e6;
  color: #7b5b00;
  line-height: 1.6
}

.pdf-preview.compact .pdf-page {
  min-height: 220px
}

.pdf-title {
  margin-bottom: 12px;
  text-align: center;
  font-weight: 800;
  font-size: 15px
}

.mark {
  margin: 6px -4px 0;
  padding: 2px 4px;
  background: #e9f4ff
}

.mark.warn {
  background: #fff4d6
}

/* BPF (ビジネスプロセスフロー) 風シェブロン */
.workflow-bar {
  gap: 3px;
  overflow: auto
}

.workflow-bar article {
  flex: 1;
  min-width: 140px;
  display: grid;
  gap: 5px;
  padding: 10px 18px 10px 24px;
  border: 0;
  border-radius: 0;
  background: #f3f3f3;
  clip-path: polygon(0 0, calc(100% - 13px) 0, 100% 50%, calc(100% - 13px) 100%, 0 100%, 13px 50%)
}

.workflow-bar article:first-child {
  padding-left: 16px;
  clip-path: polygon(0 0, calc(100% - 13px) 0, 100% 50%, calc(100% - 13px) 100%, 0 100%)
}

.workflow-bar article.done {
  background: var(--accent-soft)
}

.workflow-bar article.current {
  background: var(--accent);
  color: #fff
}

.workflow-bar article.current small {
  color: #dce8f5
}

.workflow-bar article.current span {
  background: #fff;
  color: var(--accent)
}

.workflow-bar small {
  color: var(--text-muted)
}

.review-artifact {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 320px;
  gap: 18px;
  align-items: start
}

.check-grid,
.settings-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(220px, 1fr));
  gap: 12px;
  margin-bottom: 16px
}

.settings-grid {
  grid-template-columns: repeat(3, minmax(200px, 1fr))
}

.check-card {
  display: grid;
  gap: 6px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: var(--radius-card);
  background: #fbfcfc
}

.check-card span {
  width: fit-content;
  padding: 2px 7px;
  border-radius: 999px;
  background: #e8f6ee;
  color: #1b6b45;
  font-size: 12px;
  font-weight: 800
}

@media(max-width:1180px) {

  .ctn-shell,
  .authoring,
  .master-layout,
  .import-layout,
  .output-layout,
  .review-artifact,
  .two-col {
    grid-template-columns: 1fr
  }

  .side-nav,
  .master-menu {
    position: static;
    top: auto;
    height: auto
  }

  .nav-group {
    margin-bottom: 4px
  }
}

@media(max-width:760px) {
  .workspace {
    padding: 16px
  }

  .topbar,
  .section-title,
  .field-grid,
  .check-grid,
  .settings-grid {
    display: grid;
    grid-template-columns: 1fr
  }

  table {
    min-width: 680px
  }
}
    </style>
