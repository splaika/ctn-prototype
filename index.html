<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>CTN 治験届システム化 プロトタイプ</title>
<style>
  :root{
    --bg:#0b0f14; --panel:#10151c; --panel2:#151b24; --row:#121821; --rowh:#1b2531;
    --border:#222b36; --border2:#2c3742;
    --fg:#e8eef4; --muted:#90a0b0; --faint:#5f6e7d;
    --accent:#4aa3ff; --accent-soft:#4aa3ff1f; --teal:#39c5b0; --green:#54d07f;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans","Yu Gothic UI",Meiryo,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:15px;line-height:1.6}
  a{color:inherit;text-decoration:none}

  .shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}

  /* sidebar */
  .side{border-right:1px solid var(--border);background:var(--panel);padding:18px 14px;position:sticky;top:0;height:100vh;overflow:auto}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 8px 16px}
  .brand .mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#39c5b0,#4aa3ff);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#04121a;flex:none}
  .brand b{font-size:14px}.brand small{display:block;color:var(--faint);font-size:11px;font-weight:400}
  .search{width:100%;background:var(--row);border:1px solid var(--border2);border-radius:9px;padding:8px 11px;color:var(--fg);font-size:13px;margin-bottom:14px}
  .search::placeholder{color:var(--faint)}
  .search:focus{outline:none;border-color:var(--accent)}
  .navlbl{font-size:10px;letter-spacing:.14em;color:var(--faint);font-weight:700;padding:6px 9px 4px;text-transform:uppercase}
  .nav{display:flex;flex-direction:column;gap:2px}
  .nav button{all:unset;cursor:pointer;display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;color:var(--muted);font-size:13px}
  .nav button .c{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint);background:var(--row);border-radius:6px;padding:0 7px}
  .nav button:hover{background:var(--rowh);color:var(--fg)}
  .nav button.active{background:var(--accent-soft);color:#cfe6ff}
  .nav button.active .c{color:#cfe6ff;background:#4aa3ff22}
  .side .foot{margin-top:16px;padding:12px 9px 0;border-top:1px solid var(--border);color:var(--faint);font-size:11px;line-height:1.7}
  .side .foot a{color:var(--accent)}

  /* main */
  .main{padding:26px 30px 60px;min-width:0}
  .head{margin-bottom:6px}
  .head h1{font-size:21px;margin:0 0 4px;font-weight:700}
  .head p{margin:0;color:var(--muted);font-size:13px}
  .notice{display:flex;gap:9px;background:#bb800914;border:1px solid #bb800940;border-radius:10px;padding:10px 14px;font-size:12.5px;color:#e3b341;margin:16px 0 8px}
  .count{color:var(--faint);font-size:12px;margin:18px 0 8px;font-family:var(--mono)}

  .list{display:flex;flex-direction:column;gap:7px}
  .grouplbl{font-size:11px;letter-spacing:.1em;color:var(--teal);font-weight:700;margin:16px 0 4px;text-transform:uppercase}
  .item{display:flex;align-items:center;gap:14px;background:var(--row);border:1px solid var(--border);border-radius:11px;padding:13px 16px;transition:background .13s,border-color .13s,transform .13s}
  .item:hover{background:var(--rowh);border-color:var(--border2);transform:translateX(3px)}
  .item .ic{width:34px;height:34px;border-radius:9px;background:#0e141c;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:16px;flex:none}
  .item .tx{min-width:0;flex:1}
  .item .tx b{font-size:14px;font-weight:600;display:block}
  .item .tx span{display:block;color:var(--muted);font-size:12.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .tag{font-family:var(--mono);font-size:10px;font-weight:700;border-radius:6px;padding:2px 8px;background:var(--accent-soft);color:var(--accent);flex:none}
  .item .tag.main{background:#2ea04326;color:var(--green)}
  .item .go{color:var(--faint);font-size:15px;flex:none;transition:color .13s,transform .13s}
  .item:hover .go{color:var(--accent);transform:translateX(2px)}
  .empty{color:var(--faint);font-size:13px;padding:24px 4px}

  @media(max-width:760px){
    .shell{grid-template-columns:1fr}
    .side{position:static;height:auto;border-right:0;border-bottom:1px solid var(--border)}
    .nav{flex-direction:row;flex-wrap:wrap}.nav button .c{display:none}
    .item .tx span{white-space:normal}
  }
</style>
</head>
<body>
<div class="shell">

  <aside class="side">
    <div class="brand"><span class="mark">CTN</span><span><b>治験届システム化</b><small>プロトタイプ・ポータル</small></span></div>
    <input id="q" class="search" type="search" placeholder="🔍 ドキュメントを検索…" />
    <div class="navlbl">グループ</div>
    <nav class="nav" id="nav">
      <button data-g="all" class="active">すべて<span class="c" data-cnt="all"></span></button>
      <button data-g="proto">プロトタイプ<span class="c" data-cnt="proto"></span></button>
      <button data-g="design">検討・設計<span class="c" data-cnt="design"></span></button>
      <button data-g="spec">仕様（XSD準拠）<span class="c" data-cnt="spec"></span></button>
      <button data-g="verify">検証・参照<span class="c" data-cnt="verify"></span></button>
    </nav>
    <div class="foot">社内共有用 / noindex<br><a href="https://splaika.github.io/ctn-prototype/">公開URL ↗</a></div>
  </aside>

  <main class="main">
    <div class="head">
      <h1>ドキュメント・ハブ</h1>
      <p>検討・仕様・実装・検証の成果物を、左のグループまたは検索で探せます。</p>
    </div>
    <div class="notice">⚠️ 社内共有用の試作です。URL を知る人は誰でも閲覧できます（noindex 済み）。</div>
    <div class="count" id="count"></div>
    <div class="list" id="list"></div>
    <div class="empty" id="empty" style="display:none">該当するドキュメントがありません。</div>
  </main>
</div>

<script>
const GROUPS={proto:'プロトタイプ',design:'検討・設計',spec:'仕様（公式XSD準拠）',verify:'検証・参照データ',other:'その他'};
const DOCS=[
 {g:'proto', ic:'▶', t:'UX モック (React)', d:'治験届管理のメイン画面。操作可能なインタラクティブ版', tag:'MAIN', main:true, href:'./ctn-ux-react-standalone.html'},
 {g:'proto', ic:'📘', t:'操作マニュアル', d:'UX モックの構造と使い方の解説', tag:'GUIDE', href:'./ctn-ux-manual.html'},
 {g:'design', ic:'🧭', t:'検討・設計（統合）', d:'検討まとめ／実装ハンドオフ／PoCバックログ／CSV最小統制&ライセンスをタブで集約', tag:'統合', href:'./ctn-design.html'},
 {g:'spec', ic:'🗄', t:'仕様（XSD準拠・統合）', d:'Dataverse列定義176項目／XSDマッピング138要素／届出種別マトリクスをタブで集約', tag:'XSD準拠', href:'./ctn-spec.html'},
 {g:'verify', ic:'✓', t:'XSD ラウンドトリップ検証', d:'XML生成→公式XSD検証の実証（正常PASS・不正検出・桁はXSD対象外）', tag:'検証済', href:'./ctn-xsd-roundtrip.html'},
 {g:'verify', ic:'#', t:'コード参照表', d:'大学番号一覧94件ほかコード表レジストリ', tag:'コード', href:'./ctn-code-tables.html'},
 {g:'verify', ic:'⏱', t:'期限・通知ルール', d:'変更届の提出期限管理ルール（たたき台）', tag:'ルール', href:'./ctn-deadline-rules.html'},
];
const list=document.getElementById('list'), empty=document.getElementById('empty'), count=document.getElementById('count');
let cur='all', q='';
// counts
document.querySelectorAll('[data-cnt]').forEach(el=>{const g=el.dataset.cnt; el.textContent = g==='all'?DOCS.length:DOCS.filter(d=>d.g===g).length;});
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function render(){
  const items=DOCS.filter(d=>(cur==='all'||d.g===cur) && (!q || (d.t+d.d+d.tag).toLowerCase().includes(q)));
  list.innerHTML='';
  count.textContent=items.length+' / '+DOCS.length+' 件';
  empty.style.display=items.length?'none':'block';
  let lastG=null;
  items.forEach(d=>{
    if(cur==='all' && d.g!==lastG){lastG=d.g;const h=document.createElement('div');h.className='grouplbl';h.textContent=GROUPS[d.g];list.appendChild(h);}
    const a=document.createElement('a');a.className='item';a.href=d.href;
    a.innerHTML=`<span class="ic">${esc(d.ic)}</span><span class="tx"><b>${esc(d.t)}</b><span>${esc(d.d)}</span></span><span class="tag${d.main?' main':''}">${esc(d.tag)}</span><span class="go">↗</span>`;
    list.appendChild(a);
  });
}
document.getElementById('nav').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('#nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');cur=b.dataset.g;render();});
document.getElementById('q').addEventListener('input',e=>{q=e.target.value.trim().toLowerCase();render();});
render();
</script>
</body>
</html>
